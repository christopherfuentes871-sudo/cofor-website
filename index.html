<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>COFOR | Central Valley Remote Security Surveillance</title>

  <style>
    :root{
      --line:rgba(255,255,255,.11);
      --line2:rgba(125,211,252,.24);
      --text:#f4f7fb;
      --muted:#aeb9c8;
      --sky:#7dd3fc;
      --green:#22c55e;
      --red:#ef4444;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      background:#000;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}

    .bg-grid{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(125,211,252,.045) 1px,transparent 1px),
        linear-gradient(90deg,rgba(125,211,252,.045) 1px,transparent 1px);
      background-size:42px 42px;
      opacity:.25;
      animation:gridDrift 10s linear infinite;
    }
    .bg-glow{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 0%,rgba(56,189,248,.13),transparent 28%),
        radial-gradient(circle at 88% 18%,rgba(127,176,234,.09),transparent 31%),
        radial-gradient(circle at 50% 100%,rgba(56,189,248,.08),transparent 34%);
    }
    @keyframes gridDrift{
      from{transform:translateY(0)}
      to{transform:translateY(42px)}
    }

    @keyframes flipLeftTop{
      0%,100%{transform:rotate(0deg);fill:#e5e7eb}
      50%{transform:rotate(90deg);fill:#7fb0ea}
    }
    @keyframes flipLeftBottom{
      0%,100%{transform:rotate(0deg);fill:#7fb0ea}
      50%{transform:rotate(-90deg);fill:#e5e7eb}
    }
    @keyframes flipRightTop{
      0%,100%{transform:rotate(0deg);fill:#e5e7eb}
      50%{transform:rotate(-90deg);fill:#7fb0ea}
    }
    @keyframes flipRightBottom{
      0%,100%{transform:rotate(0deg);fill:#7fb0ea}
      50%{transform:rotate(90deg);fill:#e5e7eb}
    }

    .page{position:relative;z-index:1}
    .container{max-width:1240px;margin:0 auto;padding:0 22px}

    .topbar{
      border-bottom:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.58);
      color:#b9c6d5;
      font-size:13px;
      line-height:1.45;
    }
    .topbar-inner{
      min-height:42px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      flex-wrap:wrap;
      padding:8px 0;
    }
    .top-left{display:flex;gap:20px;flex-wrap:wrap}
    .status-dot{
      width:7px;
      height:7px;
      border-radius:50%;
      display:inline-block;
      background:var(--green);
      box-shadow:0 0 8px var(--green);
      margin-right:7px;
    }

    .nav{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(0,0,0,.82);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line);
    }
    .nav-inner{
      min-height:92px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
      padding:8px 0;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }
    .logo{
      width:132px;
      overflow:visible;
      flex:0 0 auto;
    }
    .brand-name{
      font-size:28px;
      font-weight:850;
      letter-spacing:.18em;
      line-height:1;
    }
    .brand-tag{
      margin-top:7px;
      font-size:10px;
      letter-spacing:.34em;
      text-transform:uppercase;
      color:var(--muted);
      white-space:nowrap;
    }
    .nav-links{
      display:flex;
      gap:17px;
      flex-wrap:wrap;
      color:#dce4ee;
      font-size:14px;
      align-items:center;
      justify-content:flex-end;
    }
    .nav-links a:hover{color:var(--sky)}
    .nav-cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 15px;
      border-radius:6px;
      background:var(--sky);
      color:#051018;
      font-weight:850;
    }

    .hero{padding:78px 0 66px}
    .hero-grid{
      display:grid;
      grid-template-columns:1fr .92fr;
      gap:38px;
      align-items:center;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--line2);
      background:rgba(56,189,248,.10);
      color:#e3f8ff;
      font-size:13px;
      margin-bottom:22px;
    }
    h1{
      font-size:clamp(42px,6vw,74px);
      line-height:.96;
      letter-spacing:-.045em;
      margin:0 0 22px;
      max-width:1040px;
    }
    h1 span,h2 span{color:var(--sky)}
    .hero p{
      font-size:18px;
      line-height:1.72;
      color:#d4dce8;
      margin:0 0 16px;
      max-width:880px;
    }
    .hero-actions{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:28px;
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:0 20px;
      border-radius:8px;
      font-weight:850;
      border:1px solid transparent;
      cursor:pointer;
    }
    .btn-primary{background:var(--sky);color:#041018}
    .btn-secondary{
      background:rgba(255,255,255,.045);
      border-color:var(--line);
      color:#fff;
    }

    .hero-card{
      border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.025));
      border-radius:8px;
      padding:22px;
      box-shadow:0 26px 90px rgba(0,0,0,.42);
    }
    .image-box{
      border:1px solid rgba(125,211,252,.24);
      border-radius:10px;
      min-height:360px;
      background:
        linear-gradient(180deg,rgba(6,12,20,.55),rgba(6,12,20,.92)),
        radial-gradient(circle at 50% 0%,rgba(56,189,248,.18),transparent 38%),
        #080e17;
      display:grid;
      place-items:center;
      text-align:center;
      padding:28px;
      position:relative;
      overflow:hidden;
    }
    .image-box:before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(125,211,252,.07) 1px,transparent 1px),
        linear-gradient(90deg,rgba(125,211,252,.07) 1px,transparent 1px);
      background-size:20px 20px;
      opacity:.35;
    }
    .image-title{
      position:relative;
      font-size:22px;
      font-weight:850;
      color:#e8f7ff;
    }
    .image-sub{
      position:relative;
      margin-top:10px;
      color:#aebcd0;
      line-height:1.55;
      max-width:390px;
    }

    .trust-row{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-top:14px;
    }
    .trust{
      border:1px solid var(--line);
      background:rgba(255,255,255,.035);
      border-radius:8px;
      padding:14px;
    }
    .trust strong{
      display:block;
      color:var(--sky);
      font-size:16px;
      margin-bottom:4px;
    }
    .trust span{
      font-size:13px;
      color:#aeb9c8;
      line-height:1.4;
    }

    .section{
      padding:76px 0;
      border-top:1px solid var(--line);
    }
    .section-head{
      max-width:980px;
      margin-bottom:32px;
    }
    .kicker{
      color:var(--sky);
      text-transform:uppercase;
      letter-spacing:.28em;
      font-size:12px;
      font-weight:850;
      margin-bottom:12px;
    }
    h2{
      font-size:clamp(31px,4.8vw,54px);
      line-height:1.06;
      letter-spacing:-.035em;
      margin:0 0 15px;
      max-width:1080px;
    }
    .lead{
      font-size:17px;
      line-height:1.75;
      color:var(--muted);
      max-width:980px;
    }
    .muted{
      color:var(--muted);
      line-height:1.7;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
    }
    .grid-3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:20px;
    }

    .card,.mini-card{
      border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(255,255,255,.044),rgba(255,255,255,.022));
      border-radius:10px;
      padding:20px;
    }
    .card h3,.mini-card h3{
      font-size:22px;
      margin:0 0 10px;
    }
    .card p,.mini-card p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:15.5px;
    }
    .mini-card strong{
      display:block;
      color:#fff;
      margin-bottom:8px;
    }

    .slot{
      border:1px solid rgba(125,211,252,.22);
      border-radius:8px;
      min-height:220px;
      margin-bottom:16px;
      background:linear-gradient(180deg,rgba(12,22,34,.96),rgba(7,13,21,.98));
      position:relative;
      overflow:hidden;
    }
    .slot:before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(125,211,252,.055) 1px,transparent
